name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-api.txt
            requirements-mcp.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-api.txt -r requirements-mcp.txt
          python -m pip install pytest pytest-cov ruff

      - name: Verify Python dependencies are consistent
        run: python -m pip check

      - name: Lint Python
        run: python -m ruff check --select E9,F63,F7,F82 .

      - name: Test Python
        run: python -m pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          flags: python
          name: python-${{ matrix.python-version }}

  python-package:
    name: Python package build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine wheel "setuptools>=68"

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install "$(ls dist/*.whl)"
          /tmp/wheeltest/bin/umail --version
          /tmp/wheeltest/bin/python -c "import core; print('core', core.__version__)"

  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint -- --max-warnings=0

      - name: Build web
        run: npm run build

      - name: Upload static web build
        uses: actions/upload-artifact@v7
        with:
          name: web-static
          path: web/out
          if-no-files-found: error

  cloudflare-worker:
    name: Cloudflare Worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Test Worker
        run: node --test cloudflare/worker.test.mjs

  cloudflare-share-deploy:
    name: Deploy Cloudflare share demo
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [python, python-package, web, cloudflare-worker]
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download static web build
        uses: actions/download-artifact@v8
        with:
          name: web-static
          path: web/out

      - name: Check deploy credentials
        id: deploy_credentials
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN is not configured; skipping Cloudflare deploy."
          fi

      - name: Deploy Worker
        if: steps.deploy_credentials.outputs.available == 'true'
        timeout-minutes: 6
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: deploy

      - name: Smoke test live share demo
        if: steps.deploy_credentials.outputs.available == 'true'
        timeout-minutes: 3
        run: |
          set -euo pipefail
          base="https://uma.4444j99.dev"

          for i in $(seq 1 12); do
            if curl -fsS "$base/health" | grep -q '"status":"ok"'; then
              break
            fi
            if [ "$i" = "12" ]; then
              echo "::error::live share demo did not become healthy" >&2
              exit 1
            fi
            sleep 5
          done

          curl -fsS "$base/app/" >/dev/null
          curl -fsS "$base/v1/billing/plans" | grep -q '"plans"'
          curl -fsS \
            -H 'content-type: application/json' \
            -d '{"sender":"clerk@courts.ca.gov"}' \
            "$base/v1/senders/check" | grep -q '"protected":true'
