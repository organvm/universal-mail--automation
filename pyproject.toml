[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "universal-mail-automation"
description = "Multi-provider inbox triage across Gmail, Outlook, IMAP, and macOS Mail with a shared categorization engine, Eisenhower priority tiers, and time-based escalation — unified behind a single CLI."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "4444J99" }]
keywords = ["email", "gmail", "outlook", "imap", "automation", "triage", "inbox", "labeling"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications :: Email",
    "Topic :: Office/Business",
    "Topic :: Utilities",
]
dynamic = ["version"]

# Base install targets the default Gmail provider. Other providers and the
# HTTP/MCP surfaces are opt-in extras to keep a default install lean.
dependencies = [
    "google-api-python-client>=2.197.0,<3",
    "google-auth-httplib2>=0.4.0,<1",
    "google-auth-oauthlib>=1.4.0,<2",
]

[project.optional-dependencies]
# Outlook.com / Microsoft Graph support.
outlook = [
    "msal>=1.37.0,<2",
    "requests>=2.34.2,<3",
]
# YAML configuration file support (~/.config/mail_automation/config.yaml).
yaml = ["pyyaml>=6.0.3,<7"]
# HTTP API surface (see api/). Run with: uvicorn api.app:app
api = [
    "fastapi>=0.137.1",
    "uvicorn[standard]>=0.49.0",
    "httpx>=0.28.1",
    "pydantic>=2.13.4",
    "stripe>=15.2.1,<16",
]
# MCP server (see mcp_server/). The official `mcp` SDK requires Python >=3.10.
mcp = ["mcp>=1.27.2,<2"]
# Everything except the MCP server (which raises the Python floor to 3.10).
all = [
    "msal>=1.37.0,<2",
    "requests>=2.34.2,<3",
    "pyyaml>=6.0.3,<7",
    "fastapi>=0.137.1",
    "uvicorn[standard]>=0.49.0",
    "httpx>=0.28.1",
    "pydantic>=2.13.4",
    "stripe>=15.2.1,<16",
]
# Development / test tooling.
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff",
    "mypy",
    "build",
    "twine",
]

[project.urls]
Homepage = "https://github.com/organvm-iii-ergon/universal-mail--automation"
Repository = "https://github.com/organvm-iii-ergon/universal-mail--automation"
Changelog = "https://github.com/organvm-iii-ergon/universal-mail--automation/blob/main/CHANGELOG.md"
"Live Demo" = "https://uma.4444j99.dev"

[project.scripts]
umail = "cli:main"
umail-mcp = "mcp_server.server:main"

[tool.setuptools]
# Flat layout: ship the importable packages plus the top-level entry-point and
# legacy modules. Operational one-off scripts at the repo root are intentionally
# excluded from the wheel.
packages = ["core", "providers", "auth", "api", "mcp_server"]
py-modules = ["cli", "gmail_auth", "gmail_labeler", "imap_rules"]

[tool.setuptools.dynamic]
version = { attr = "core.__version__" }

[tool.setuptools.package-data]
core = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
