name: Publish

# Build the PyPI distributions and the macOS bundle, then publish on a release.
#
# Triggers:
#   - push of a v* tag (e.g. v0.2.0)  → full build + publish to PyPI
#   - GitHub Release published         → full build + publish + attach bundle
#   - workflow_dispatch                → build + verify only (no publish)
#
# PyPI publishing uses Trusted Publishing (OIDC) — configure a publisher for
# this repo+workflow at https://pypi.org/manage/account/publishing/. No API
# token secret is required when the `pypi` environment is set up that way.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: |
          python -m twine check dist/*
          ls -l dist

      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install "$(ls dist/*.whl)"
          /tmp/wheeltest/bin/umail --version
          /tmp/wheeltest/bin/python -c "import core; print('core', core.__version__)"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  macos-bundle:
    name: Build macOS bundle
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Build bundle from wheel
        run: bash scripts/build_macos_bundle.sh "$(ls dist/*.whl)"

      - name: Verify bundle launcher
        run: |
          tarball="$(ls dist/*-macos.tar.gz)"
          tar -xzf "$tarball" -C /tmp
          "/tmp/$(basename "$tarball" .tar.gz)/bin/umail" --version

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: dist/*-macos.tar.gz

      - name: Attach bundle to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-macos.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, macos-bundle]
    # Only publish for real releases / tags, never on manual dispatch.
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/universal-mail-automation
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
