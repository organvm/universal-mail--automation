name: Python CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-api.txt -r requirements-mcp.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint with ruff
        run: |
          set +e
          ruff check . | tee ruff.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## Ruff advisory findings"
              echo
              echo '```text'
              cat ruff.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Ruff advisory check found issues; pytest remains the hard gate."
          fi

      - name: Type check with mypy
        run: |
          set +e
          mypy . --ignore-missing-imports | tee mypy.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## Mypy advisory findings"
              echo
              echo '```text'
              cat mypy.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Mypy advisory check found issues; pytest remains the hard gate."
          fi

      - name: Test with pytest
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: success() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          name: codecov-${{ matrix.python-version }}

  cloudflare-share-deploy:
    name: Deploy Cloudflare share demo
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deploy credentials
        id: deploy_credentials
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN is not configured; skipping Cloudflare deploy."
          fi

      - name: Deploy Worker
        if: steps.deploy_credentials.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: deploy

      - name: Smoke test live share demo
        if: steps.deploy_credentials.outputs.available == 'true'
        run: |
          set -euo pipefail
          base="https://universal-mail-automation-demo.ivixivi.workers.dev"
          curl -fsS "$base/health" | grep -q '"status":"ok"'
          curl -fsS "$base/app/" >/dev/null
          curl -fsS "$base/v1/billing/plans" | grep -q '"plans"'
          curl -fsS \
            -H 'content-type: application/json' \
            -d '{"sender":"clerk@courts.ca.gov"}' \
            "$base/v1/senders/check" | grep -q '"protected":true'
